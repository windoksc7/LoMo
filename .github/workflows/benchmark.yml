name: Performance Benchmark

on: [push] # 코드를 올릴 때마다 자동 실행

defaults:
  run:
    working-directory: ./src/engine # 모든 명령어를 이 폴더 안에서 실행해라!

jobs:
  benchmark-windows:
    runs-on: windows-latest # Windows 환경 (cl 컴파일러 사용 가능)
    steps:
      - uses: actions/checkout@v4

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1

      - name: Build Generator and Engine
        run: |
          cl /O2 dummy.c /Fe:log_gen.exe
          cl /O2 /arch:AVX2 scanner_core.c /Fe:scanner.exe

      - name: Generate 1GB Dummy Log
        run: ./log_gen.exe

      - name: Run Cold Benchmark (첫 번째 실행)
        run: ./scanner.exe

      - name: Run Warm Benchmark (두 번째 실행)
        run: ./scanner.exe

  benchmark-linux:
    runs-on: ubuntu-latest # Linux 환경 (gcc 사용)
    steps:
      - uses: actions/checkout@v4

      - name: Build with GCC
        run: |
          gcc -O3 log_gen.c -o log_gen
          gcc -O3 -mavx2 scanner_core.c -o scanner

      - name: Generate 1GB Dummy Log
        run: ./log_gen

      - name: Run Benchmark
        run: ./scanner
