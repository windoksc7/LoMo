name: 3-OS Performance Benchmark

on: [push]

defaults:
  run:
    working-directory: ./src/engine # 모든 명령어를 이 폴더 안에서 실행해라!

jobs:
  benchmark:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        # 3대 OS 환경 설정
        os: [windows-latest, ubuntu-latest, macos-latest]

    steps:
      - uses: actions/checkout@v4

      # Windows 환경 설정 및 빌드
      - name: Setup MSVC (Windows)
        if: matrix.os == 'windows-latest'
        uses: ilammy/msvc-dev-cmd@v1
      - name: Build (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          cl /O2 /arch:AVX2 dummy.c /Fe:log_gen.exe
          cl /O2 /arch:AVX2 scanner.c /Fe:scanner.exe

      # Linux/macOS 환경 설정 및 빌드
      - name: Build (Linux/macOS)
        if: matrix.os != 'windows-latest'
        run: |
          gcc -O3 dummy.c -o log_gen
          gcc -O3 -mavx2 scanner.c -o scanner

      # 공통 실행 단계
      - name: Run Benchmark
        run: |
          ${{ matrix.os == 'windows-latest' && './log_gen.exe' || './log_gen' }}
          ${{ matrix.os == 'windows-latest' && './scanner.exe' || './scanner' }}
